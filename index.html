<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LKN</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

<!-- NAVBAR -->
<header class="bg-black text-white p-4 shadow-lg">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <h1 class="text-2xl font-bold">LKN</h1>
    <nav class="space-x-6">
      <a href="#" class="hover:text-gray-300">Home</a>
      <a href="#shop" class="hover:text-gray-300">Shop</a>
      <a href="#contact" class="hover:text-gray-300">Contact</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="text-center py-24 bg-gradient-to-r from-black to-gray-800 text-white">
  <h2 class="text-5xl font-bold mb-4">LKN</h2>
  <p class="text-lg mb-6">Modern Merch. Clean Style.</p>
  <a href="#shop" class="bg-white text-black px-6 py-3 rounded-xl font-semibold hover:scale-105 transition">Shop Now</a>
</section>

<!-- SHOP -->
<section id="shop" class="py-16 max-w-6xl mx-auto">
  <h2 class="text-3xl font-bold text-center mb-10">Shop</h2>
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">

    <div class="bg-white p-4 rounded-2xl shadow hover:shadow-xl transition">
      <img src="https://via.placeholder.com/300" class="rounded-xl mb-3" />
      <h3 class="font-semibold">LKN Hoodie</h3>
      <p>$40</p>
      <button onclick="addToCart('Hoodie',40)" class="mt-2 w-full bg-black text-white py-2 rounded-lg">Add to Cart</button>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow hover:shadow-xl transition">
      <img src="https://via.placeholder.com/300" class="rounded-xl mb-3" />
      <h3 class="font-semibold">LKN Shirt</h3>
      <p>$25</p>
      <button onclick="addToCart('Shirt',25)" class="mt-2 w-full bg-black text-white py-2 rounded-lg">Add to Cart</button>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow hover:shadow-xl transition">
      <img src="https://via.placeholder.com/300" class="rounded-xl mb-3" />
      <h3 class="font-semibold">LKN Hat</h3>
      <p>$20</p>
      <button onclick="addToCart('Hat',20)" class="mt-2 w-full bg-black text-white py-2 rounded-lg">Add to Cart</button>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow hover:shadow-xl transition">
      <img src="https://via.placeholder.com/300" class="rounded-xl mb-3" />
      <h3 class="font-semibold">LKN Shorts</h3>
      <p>$30</p>
      <button onclick="addToCart('Shorts',30)" class="mt-2 w-full bg-black text-white py-2 rounded-lg">Add to Cart</button>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow hover:shadow-xl transition">
      <img src="https://via.placeholder.com/300" class="rounded-xl mb-3" />
      <h3 class="font-semibold">LKN Jacket</h3>
      <p>$60</p>
      <button onclick="addToCart('Jacket',60)" class="mt-2 w-full bg-black text-white py-2 rounded-lg">Add to Cart</button>
    </div>

  </div>
</section>

<!-- CART -->
<section class="max-w-4xl mx-auto py-10">
  <h2 class="text-2xl font-bold mb-4">Cart</h2>
  <ul id="cart" class="mb-4"></ul>
  <p id="total" class="font-semibold"></p>
</section>

<!-- CONTACT -->
<section id="contact" class="bg-black text-white py-16 text-center">
  <h2 class="text-3xl font-bold mb-4">Contact</h2>
  <p>Email: your@email.com</p>
</section>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({ name, price });
  renderCart();
}

function renderCart() {
  const cartEl = document.getElementById('cart');
  const totalEl = document.getElementById('total');

  cartEl.innerHTML = '';
  let total = 0;

  cart.forEach(item => {
    total += item.price;
    const li = document.createElement('li');
    li.textContent = `${item.name} - $${item.price}`;
    cartEl.appendChild(li);
  });

  totalEl.textContent = 'Total: $' + total;
}
</script>

</body>
</html>
